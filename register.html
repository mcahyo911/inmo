<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>inmo — Registrasi Administrator</title>

<!-- Font External -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"/>

<!-- Menghubungkan ke file CSS utama -->
<link rel="stylesheet" href="style.css"/>
</head>
<body style="display:flex; align-items:center; justify-content:center; background-image:radial-gradient(ellipse at 30% 20%,rgba(108,111,255,.08) 0%,transparent 60%), radial-gradient(ellipse at 70% 80%,rgba(56,189,248,.06) 0%,transparent 50%); min-height:100vh;">

<div class="notification-container" id="notif-container"></div>

<!-- ================= KARTU REGISTRASI ================= -->
<div class="auth-card" id="card-register">
  <div class="auth-brand"><span class="brand-icon">⬡</span><span class="brand-name">inmo</span></div>
  <h1 class="auth-title">Registrasi Admin</h1>
  <p class="auth-subtitle">Daftarkan identitas pengelola sistem baru</p>
  
  <div class="form-group">
    <label>Nama Lengkap</label>
    <input type="text" id="reg-name" placeholder="Ketik nama operasional Anda"/>
  </div>
  <div class="form-group">
    <label>Alamat Surel</label>
    <input type="email" id="reg-user" placeholder="admin@perusahaan.com"/>
  </div>
  <div class="form-group">
    <label>Kata Sandi</label>
    <div class="pw-wrapper">
      <input type="password" id="reg-pass" placeholder="Minimal 6 karakter"/>
      <span class="pw-toggle" onclick="togglePW('reg-pass', this)">👁️</span>
    </div>
  </div>
  
  <button type="button" class="btn-primary" id="btn-do-register">Simpan Identitas</button>
  
  <div class="auth-switch" style="justify-content: center; margin-top: 25px;">
    <!-- Tautan ini akan mengembalikan Anda ke halaman login.html -->
    <span>Sudah terdaftar? <a href="login.html">Kembali ke Log In</a></span>
  </div>
</div>

<!-- Menghubungkan logika otentikasi Firebase (akan kita buat selanjutnya) -->
<script type="module" src="auth.js"></script>

<!-- Skrip UI super ringan untuk animasi mata password -->
<script>
  function togglePW(id, el) {
    const inp = document.getElementById(id);
    if(inp.type === 'password') { inp.type = 'text'; el.style.opacity = '1'; } 
    else { inp.type = 'password'; el.style.opacity = '0.6'; }
  }
</script>

</body>
</html>
